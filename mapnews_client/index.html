    <script type="module">
        import { MapManager } from './src/components/Map.js';
        import { NewsManager } from './src/components/NewsManager.js';
        import { fetchCities, fetchSources } from './src/api/news.js';
        import { LOCATION, POLYGON_STYLE, POLYGON_STYLE_ACTIVE } from './src/constants.js';
        import { AuthManager } from './src/api/auth.js';
        import { WeatherManager } from './src/api/weather.js';
        import { newsItemManager } from './src/components/NewsItem.js';
        import { FavoritesService } from './src/api/favorites.js';
        
        window.newsItemManager = newsItemManager;

        const auth = new AuthManager();
        const weather = new WeatherManager();
        window.POLYGON_STYLE = POLYGON_STYLE;
        window.POLYGON_STYLE_ACTIVE = POLYGON_STYLE_ACTIVE;
        
        window.newsManager = new NewsManager();
        let mapManager;

        if (auth.isLoggedIn()) {
            document.getElementById('logout').addEventListener('click', () => {
                auth.logout();
                window.location.href = '/login.html';
            });
        } else {
            document.getElementById('slider_favorite_cities').classList.add('hidden');
            document.getElementById('slider_favorite_sources').classList.add('hidden');
        }
        
        weather.fetchWeather().then(weather => {
            document.querySelector('.weather__info').textContent = `${Math.round(weather.temp)}°`;
            document.querySelector('.weather__img').src = weather.icon;
        });
        
        async function main() {
            try {
                await ymaps3.ready;
                const { YMap, YMapDefaultSchemeLayer, YMapDefaultFeaturesLayer } = ymaps3;
                
                mapManager = new MapManager('app', LOCATION, [
                    new YMapDefaultSchemeLayer({ theme: 'dark', source: 'scheme', projection: "mercator" }),
                    new YMapDefaultFeaturesLayer({})
                ]);
        
                await new Promise(resolve => setTimeout(resolve, 100));
        
                const [cities, sources] = await Promise.all([
                    fetchCities(),
                    fetchSources()
                ]);
        
                initializeCities(cities);
                initializeSources(sources);
                window.initializeSliders();
                await window.newsManager.updateNews();

                const preloader = document.getElementById('preloader');
                preloader.classList.add('hidden');
                
                setTimeout(() => {
                    preloader.remove();
                }, 500);

            } catch (error) {
                console.error('Ошибка при инициализации:', error);
                document.getElementById('preloader').classList.add('hidden');
            }
        }
    
        function initializeCities(cities) {
            const sliderContainer = document.getElementById('slides_one');
            sliderContainer.innerHTML = '';
            
            cities.forEach(city => {
                sliderContainer.insertAdjacentHTML('beforeend', 
                    `<div class="slide" id="slide_${city._id}" onclick='window.handleCityClick("${city._id}", "slide")'>
                        <img src="${city.imageUrl}" class="slide-img">
                        <p class="slide-text">${city.name}</p>
                    </div>`
                );
                
                mapManager.addCity(city, window.handleCityClick);
            });
        }
    
        function initializeSources(sources) {
            const sourcesContainer = document.getElementById('slides_two');
            sourcesContainer.innerHTML = '';
            
            sources.forEach(source => {
                sourcesContainer.insertAdjacentHTML('beforeend',
                    `<div class="slide" id="source_${source._id}" onclick='window.handleSourceClick("${source._id}")'>
                        <img src="${source.imageUrl}" class="slide-img">
                        <p class="slide-text">${source.title}</p>
                    </div>`
                );
            });
        }
    
        window.handleCityClick = (el_id, el_type) => {
            const markerElement = document.getElementById(`marker_${el_id}`);
            const slideElement = document.getElementById(`slide_${el_id}`);
            const isActive = markerElement.classList.contains('active');
            
            markerElement.classList.toggle('active');
            slideElement.classList.toggle('active');
            
            mapManager.updatePolygonStyle(el_id, !isActive);
            window.newsManager.updateCity(el_id, isActive);
        };

        window.handleSourceClick = (el_id) => {
            const sourceElement = document.getElementById(`source_${el_id}`);
            const isActive = sourceElement.classList.contains('active');
            sourceElement.classList.toggle('active');
            window.newsManager.updateSource(el_id, isActive);
        };
    
        main().catch(console.error);

        async function updateUserInterface() {
            const userSection = document.getElementById('userSection');
            const userName = document.getElementById('userName');
            const likedMenuBar = document.getElementById('liked_menu_bar');
            const logoutButton = document.getElementById('logout');
            
            const user = await auth.getUserInfo();
            
            if (user) {
                userName.textContent = user.name;
                logoutButton.classList.add('menu_ul_li');
                logoutButton.innerHTML = `
                    <div class="menu__ul_li-img_container">
                        <img src="./src/images/icons/sign-out.svg" class="menu__ul_li-img">
                    </div>
                    <p class="menu__ul_li-text">Выход</p>
                `;
            } else {
                userSection.style.display = 'none';
                likedMenuBar.style.display = 'none';
                logoutButton.innerHTML = `
                    <a class="menu_ul_li" href="/login.html">
                    <div class="menu__ul_li-img_container">
                        <img src="./src/images/icons/user-dark.svg" class="menu__ul_li-img">
                    </div>
                    <p class="menu__ul_li-text">Войти</p>
                    </a>
                `;
            }
        }

        updateUserInterface();

        const favoritesBtn = document.getElementById('favorites-btn');
        const contentContainer = document.getElementById('content');

        if (favoritesBtn) {
        favoritesBtn.addEventListener('click', async () => {
        try {
            contentContainer.innerHTML = '<div class="loading">Загрузка избранного...</div>';
            
            const favorites = await FavoritesService.getFavorites('news');
            
            contentContainer.innerHTML = '';
            
            if (favorites.length === 0) {
            contentContainer.innerHTML = '<p class="empty">У вас пока нет избранных новостей</p>';
            return;
            }
            
            favorites.forEach(news => {
            const newsElement = createNewsElement(news);
            contentContainer.appendChild(newsElement);
            });
            
        } catch (error) {
            console.error('Ошибка загрузки избранного:', error);
            contentContainer.innerHTML = '<p class="error">Не удалось загрузить избранное</p>';
        }
        });
        }

        function createNewsElement(news) {
        const element = document.createElement('div');
        element.className = 'news-item';
        element.innerHTML = `
            <div class="new__item">
                <div class="new__item-left">
                    <img src="${news.imageUrl}" alt="${news.title}" class="new__item-img">
                    <div class="new__item-img-info"> 
                        <button data-type="news" data-id="685800aa692c248e3ca18fb2" class="new__like-btn ">
                            <img src="./src/images/icons/like.svg" alt="" class="like-img">
                        </button>
                        <div class="new-time-container">
                            <p class="new-time">Сегодня 16:01</p>
                        </div>  
                        <div class="new-city-container">
                            <img src="${news.place_id.name}" alt="new" class="new-city-img">
                            <p class="new-city-title">${news.place_id.name}</p>
                        </div>
                            </div>
                        </div>
                        <div class="new__item-right">
                            <div class="top__item">
                                <p class="new__title">${news.title}</p>
                                <p class="new__text">${news.text}</p>
                            </div>
                        <div class="new__bottom">
                        <div class="new-source-container">
                            <img src="http://212.15.49.85:8080/images/sources/ko.png" alt="new" class="new-source-img">
                            <p class="new-source-title">КомиОнлайн</p>
                        </div>
                        <div class="new__bottom__right">
                            <div class="share-btn" onclick="clipboard('${news.newsUrl}')">
                                <img src="./src/images/icons/share.png" alt="" class="share-img">
                            </div>
                            <a href="${news.newsUrl}" class="open-new" target="_blank">Перейти</a>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        const favBtn = element.querySelector('.favorite-btn');
        favBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            await toggleFavorite(news._id, element);
        });
        
        return element;
        }

        async function toggleFavorite(newsId, element) {
        try {
            await FavoritesService.removeFavorite('news', newsId);
            
            element.style.opacity = '0';
            setTimeout(() => {
            element.remove();
            
            if (!contentContainer.querySelector('.news-item')) {
                contentContainer.innerHTML = '<p class="empty">У вас пока нет избранных новостей</p>';
            }
            }, 300);
            
        } catch (error) {
            console.error('Ошибка удаления из избранного:', error);
            alert('Не удалось удалить из избранного');
        }
        }
    </script>
