services:
  # 主 API 服务器
  - type: web
    name: mapnews-server
    runtime: node
    rootDir: mapnews_server
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # 新闻爬虫（后台 Worker）
  - type: worker
    name: mapnews-parser
    runtime: node
    rootDir: mapnews_server
    buildCommand: npm install
    startCommand: node parser.js
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
